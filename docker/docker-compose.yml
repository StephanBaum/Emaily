name: emaily

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: emaily-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-emaily}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emaily}
      POSTGRES_DB: ${POSTGRES_DB:-emaily}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-emaily}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: emaily-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  greenmail:
    image: greenmail/standalone:2.0.0
    container_name: emaily-greenmail
    ports:
      - "3025:3025"
      - "3110:3110"
      - "3143:3143"
      - "3465:3465"
      - "3993:3993"
      - "3995:3995"
    environment:
      - GREENMAIL_OPTS=-Dgreenmail.setup.test.all -Dgreenmail.hostname=0.0.0.0 -Dgreenmail.users=test:test@localhost

volumes:
  postgres_data:
    name: emaily_postgres_data
    external: true
  redis_data:
    name: emaily_redis_data
    external: true
